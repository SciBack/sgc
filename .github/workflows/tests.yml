name: Tests SGC

# Ejecuta la suite de integración Frappe de la app `sgc` sobre PostgreSQL,
# replicando el entorno real (Frappe version-16 + Python 3.14 + Node 24 + PG 16).
# Ningún test invoca Chrome/PDF, así que no se instala navegador.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Integración (PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379

    steps:
      - name: Clonar la app en ./sgc
        uses: actions/checkout@v4
        with:
          path: sgc

      - name: Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcups2-dev
          npm install -g yarn

      - name: Instalar frappe-bench
        run: pip install frappe-bench

      - name: Init bench (Frappe version-16, sin assets)
        run: |
          bench init \
            --frappe-branch version-16 \
            --skip-redis-config-generation \
            --skip-assets \
            --python "$(which python)" \
            frappe-bench

      - name: Configurar bench (Redis de los services)
        working-directory: frappe-bench
        run: |
          bench set-config -g redis_cache    "redis://localhost:13000"
          bench set-config -g redis_queue    "redis://localhost:11000"
          bench set-config -g redis_socketio "redis://localhost:11000"
          bench set-config -g developer_mode 1

      - name: Instalar la app `sgc` en el bench
        working-directory: frappe-bench
        run: bench get-app sgc "${{ github.workspace }}/sgc" --skip-assets

      - name: Crear sitio de test sobre PostgreSQL
        working-directory: frappe-bench
        run: |
          bench new-site test_site.localhost \
            --db-type postgres \
            --db-host 127.0.0.1 \
            --db-port 5432 \
            --db-root-username postgres \
            --db-root-password postgres \
            --admin-password admin \
            --install-app sgc

      - name: Ejecutar la suite de `sgc`
        working-directory: frappe-bench
        run: |
          bench --site test_site.localhost set-config allow_tests true
          bench --site test_site.localhost run-tests --app sgc
