    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:root
      ref_id: E6
      name: RESPONSABILIDAD SOCIAL UNIVERSITARIA
      description: Se evalúa el impacto de la formación en los egresados, en la adquisición de competencias y en el ejercicio profesional y se implantan acciones de mejora, en los casos que corresponda, para alcanzar el impacto deseado.
      annotation: |-
        📖 Fuente: Estándar 6, p. 58 del Modelo CONEAU 2025.

        📎 Evidencias del estándar (fuentes de verificación, p. 58):
        EV34: informe [sic] de medición del impacto de la formación en los egresados del programa de estudios. Debe incluir el análisis de los siguientes indicadores: ID20: porcentaje de egresados satisfechos con la calidad y utilidad de la formación recibida, para su empleabilidad; ID26: tiempo promedio entre egreso y primer empleo en el campo profesional; ID27: Porcentaje de egresados que laboran en su campo profesional
        EV35: informe [sic] que incluye opinión de empleadores y/u otras partes interesadas respecto del impacto de la formación en los egresados del programa de estudios. Se incluye el análisis del indicador: ID29: porcentaje de empleadores satisfechos con el desempeño de los egresados
        EV36: Informe y evidencias de acciones de mejora implementadas en el proceso de formación en los últimos dos años.

        💬 Valoración por estándar en 3 niveles (NL=0 / L=1 / LP=2), analizando sus criterios e indicadores asociados.
