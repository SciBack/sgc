    min_score: 0
    max_score: 2
    scores_definition:
    - score: 0
      name: NL — Estándar no logrado
      description: Cuando se ha demostrado que el programa de estudios no cumple con todos los criterios del estándar y las debilidades detectadas afectan seriamente la calidad de los procesos y resultados del programa.
    - score: 1
      name: L — Estándar logrado
      description: Cuando se ha demostrado que el programa de estudios cumple con todos los criterios del estándar, pero la evaluación muestra que hay debilidades y oportunidades de mejora por implementar.
    - score: 2
      name: LP — Estándar logrado plenamente
      description: Cuando se ha demostrado que el programa de estudios cumple con todos los criterios del estándar.
    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:root
      assessable: false
      depth: 1
      ref_id: CONEAU-2025
      name: Modelo de Acreditación CONEAU Programas 2025
      description: Modelo de Acreditación para Programas de Estudios de Educación Superior Universitaria (CONEAU 2025, SINEACE).
      annotation: |-
        Modelo de Acreditación para Programas de Estudios de Educación Superior Universitaria — CONEAU 2025 (SINEACE). El documento se titula "2025" (metadatos del PDF: creado 2025-09-12, modificado 2025-09-26). Estructura plana: 10 estándares → 53 criterios → 52 evidencias (por estándar) → 29 indicadores (transversales). No existen dimensiones ni factores.

        VALORACIÓN (Sección IX, pp. 94-98): la valoración es POR ESTÁNDAR en escala de 3 niveles — NL (no logrado) = 0, L (logrado) = 1, LP (logrado plenamente) = 2. Se analiza el criterio y el comportamiento de sus indicadores asociados sobre los últimos cuatro semestres (o dos periodos anuales). Los valores absolutos de los indicadores NO fijan el nivel de logro; importa su evolución y las mejoras implementadas. Cada indicador tiene nivel referencial con margen de error de ±3% (ej.: si el referencial es 70%, un 67% es aceptable; una evolución positiva n-1→n también).

        VIGENCIA (Tabla 9, p. 95): En proceso = presencia de uno o más estándares NL. Acreditado 3 años = todos los estándares L, o combinación de L y LP. Acreditado 6 años = todos LP. Acreditado 8 años = todos LP + ≥ 16 puntos de la tabla de criterios de excelencia (Tabla 10).

        EXCELENCIA (Tabla 10, pp. 96-98): otorga puntos adicionales (requiere todos los estándares LP + ciclo de mejora continua consolidado + acumulado ≥ 16 puntos). Criterios: % docentes con doctorado (1-3 pts), % docentes Renacyt (1-3), % docentes a tiempo completo (1-3), % egresados por promoción (1-3), % egresados trabajando en su profesión el primer año (1-3), % egresados titulados al primer año (1-3), SGC (implementado 4 · certificado 8), acreditación de agencia del extranjero (3), idoneidad de infraestructura — promedio ID3 e ID17 (1-3), y contribución cultural/artística/histórica/filosófica excepcional (hasta 6).
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:root
      ref_id: E1
      name: GESTIÓN DEL PROGRAMA DE ESTUDIOS
      description: El programa de estudios gestiona su accionar mediante una organización interna formalmente establecida, a cargo de personal competente, con base en planes estratégicos y operativos que incluyen, entre otros, objetivos académicos definidos, cuyo grado de cumplimiento es evaluado, por lo menos, con periodicidad anual.
      annotation: |-
        📖 Fuente: Estándar 1, p. 50 del Modelo CONEAU 2025.

        📎 Evidencias del estándar (fuentes de verificación, p. 50):
        EV1: Documento(s) que define(n) la organización interna para la gestión del programa de estudios.
        EV2: Hoja de vida del cuerpo directivo a cargo de la gestión del programa de estudios.
        EV3: Documento que contiene los objetivos académicos del programa de estudios.
        EV4: Publicación de los objetivos académicos que evidencien su accesibilidad por las partes interesadas
        EV5: Planes estratégicos y operativos vigentes de los los [sic] dos años anteriores a la autoevaluación con fines de acreditación.
        EV6: Informes de evaluación de los planes estratégicos y operativos
        EV7: Informes sobre quejas, reclamos y denuncias presentadas y las atenciones o soluciones, e las mismas han tenido [sic]

        💬 Valoración por estándar en 3 niveles (NL=0 / L=1 / LP=2), analizando sus criterios e indicadores asociados.
      reference_controls:
      - urn:intuitem:risk:function:coneau-programas-2025:id8
