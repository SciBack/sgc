      ref_id: E4
      name: PLANA DOCENTE
      description: La plana docente cuenta con las características académicas y experiencia requeridas en el currículo, para llevar a cabo las actividades de formación profesional.
      annotation: |-
        📖 Fuente: Estándar 4, p. 55 del Modelo CONEAU 2025.

        📎 Evidencias del estándar (fuentes de verificación, p. 55):
        EV20: Reglamento de personal docente o similar o documentos que orientan y norman la gestión docente (convocatoria, selección, vinculación, permanencia, evaluación, promoción y desvinculación).
        EV21: Documentos que orientan y regulan la evaluación de desempeño docente (incluidos los instrumentos de medición).
        EV22: Currículum vitae documentado de los docentes.
        EV23: Formato C9 de la Sunedu, o similar, que incluya una columna con la relación de asignaturas en las que se ha desempeñado cada docente durante los últimos períodos académicos (2 años o 4 semestres, relacionado con la duración del periodo).
        EV24: Informe en el que se explique la pertinencia de la formación y experiencia de cada docente, con la naturaleza de las asignaturas en que se desempeña, de acuerdo con lo establecido en los criterio [sic] 4.1, 4.2 y 4.3.
        EV25: Informe y documentación sustentadora sobre los resultados de evaluación de desempeño docente de los dos (2) últimos años.
        EV26: Plan de capacitación o documento similar del programa, facultad o institución, que evidencie lo requerido en el criterio 4.5.
        EV27: Informe y documentación sustentadora de los resultados de las capacitaciones de los docentes del programa de los dos (2) últimos años, en correspondencia con lo requerido en el criterio 4.5.
        EV28: Informe y documentación sustentadora de los resultados de producción científica, innovación o creación cultural y artística de los docentes vinculados al programa de estudios. Debe incluir acceso a las fuentes primarias de lo producido.
        EV29: Información sobre las experiencias académicas y trabajos colaborativos en la que los docentes han participado, de acuerdo con lo establecido en el criterio 4.6

        💬 Valoración por estándar en 3 niveles (NL=0 / L=1 / LP=2), analizando sus criterios e indicadores asociados.
