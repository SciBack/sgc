      ref_id: E8
      name: GESTIÓN DE LA INFORMACIÓN
      description: Se recoge y analiza información de la gestión y resultados del programa
      annotation: |-
        📖 Fuente: Estándar 8, p. 60 del Modelo CONEAU 2025.

        📎 Evidencias del estándar (fuentes de verificación, p. 60):
        EV40: Documento(s) que orienta(n) y regula(n) el recojo y análisis de la información, de acuerdo con lo establecido en el criterio 8.1
        EV41: Resultados acerca de la satisfacción de los estudiantes con la gestión y el desarrollo de las actividades académicas y administrativas del programa (docentes, recursos, currículo, evaluación del aprendizaje, actividades de asesoría y tutoría, bienestar, administración, etc.) (ID1, ID2, ID3, ID4, ID5, ID7, ID8)
        EV42: Resultados acerca de la satisfacción de los docentes con la gestión y el desarrollo de las actividades académicas y administrativas del programa (recursos, currículo, administración, etc.), así como con las actividades de fortalecimiento de capacidades y de desarrollo académico. (ID12, ID16, ID17, ID18)
        EV43: Resultados acerca de la satisfacción de los egresados con la gestión y el desarrollo de las actividades académicas y administrativas del programa (docentes, currículo, calidad de la enseñanza, programas de bienestar, servicios de apoyo administración [sic], etc.), impacto de la formación recibida en su desarrollo profesional y personal u otras cuestiones que se consideren pertinentes. (ID20, ID21, ID22, ID23, ID24).
        EV44: Resultados acerca de la satisfacción de los empleadores con el desempeño de los egresados, sus competencias, calidad de la formación recibida, entre otras cuestiones que se consideren pertinentes. (ID29).

        💬 Valoración por estándar en 3 niveles (NL=0 / L=1 / LP=2), analizando sus criterios e indicadores asociados.
