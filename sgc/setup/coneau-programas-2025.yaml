           ID8 — Porcentaje de estudiantes satisfechos con los procedimientos de los servicios administrativos (referencial ID8 ≥ 60%).
           ID9 — Porcentaje de estudiantes satisfechos con los servicios de apoyo pedagógico para la mejora del desempeño académico de los estudiantes (referencial ID9 ≥ 70%).
           ID12 — Porcentaje de docentes satisfechos con el currículo (referencial ID12 ≥ 70%).
           ID13 — Porcentaje de docentes a tiempo completo (referencial ID13 ≥ 25%).
           ID14 — Porcentaje de docentes con el grado académico de doctor (referencial ID14 ≥ 20%).
           ID15 — Porcentaje de docentes que han recibido formación, capacitación o especialización en docencia e investigación, en los últimos dos años (referencial ID15 ≥ 50%).
           ID16 — Porcentaje de docentes satisfechos con las actividades de fortalecimiento de capacidades y las posibilidades de desarrollo académico (referencial ID16 ≥ 70%).
           ID17 — Porcentaje de docentes satisfechos con los recursos requeridos para el desarrollo de las actividades de enseñanza - aprendizaje (referencial ID17 ≥ 70%).
           ID18 — Porcentaje de docentes satisfechos con los procedimientos de los servicios administrativos (referencial ID18 ≥ 75%).
           ID20 — Porcentaje de egresados satisfechos con la calidad y utilidad de la formación recibida, para su empleabilidad (referencial ID20 ≥ 70%).
           ID21 — Porcentaje de egresados satisfechos con los procedimientos de los servicios administrativos (referencial ID21 ≥ 70%).
           ID22 — Porcentaje de egresados satisfechos con la calidad de enseñanza (referencial ID22 ≥ 70%).
           ID23 — Porcentaje de egresados satisfechos con los programas de bienestar y actividades recreativas, culturales, artísticas y deportivas (referencial ID23 ≥ 70%).
           ID24 — Porcentaje de egresados satisfechos con los servicios de apoyo al estudiante (referencial ID24 ≥ 70%).
           ID26 — Tiempo promedio entre egreso y primer empleo en el campo profesional (referencial ID26 ≤ 1 año).
           ID27 — Porcentaje de egresados que laboran en su campo profesional (referencial ID27 ≥ 50%).
           ID28 — Porcentaje de estudiantes que han alcanzado el título profesional, dentro de los dos años posteriores a su egreso (referencial ID28 ≥ 60%).

        💬 Se recoge y analiza información de estudiantes, docentes, egresados y empleadores.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e8.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e8
      ref_id: '8.3'
      name: Indicadores de desempeño docente
      description: Se recoge y analiza información sobre indicadores de desempeño docente (ID2, ID19).
      annotation: |-
        📖 Fuente: Criterio 8.3, p. 60.

        📊 Indicadores asociados:
           ID2 — Porcentaje de estudiantes satisfechos con el desempeño docente (referencial ID2 ≥ 70%).
           ID19 — Porcentaje de docentes con desempeño satisfactorio, en opinión de los estudiantes (referencial ID19 ≥ 75%).

        💬 Se analizan los indicadores de desempeño docente.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e8.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e8
      ref_id: '8.4'
      name: Indicadores de evaluación del aprendizaje
      description: Se recoge y analiza información sobre indicadores de evaluación del aprendizaje (ID4, ID10).
      annotation: |-
        📖 Fuente: Criterio 8.4, p. 60.

        📊 Indicadores asociados:
           ID4 — Porcentaje de estudiantes satisfechos con la evaluación del aprendizaje (referencial ID4 ≥ 60%).
           ID10 — Porcentaje de estudiantes aprobados por asignatura (referencial ID10 ≥ 80%).

        💬 Se analizan los indicadores de evaluación del aprendizaje.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e8.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e8
      ref_id: '8.5'
      name: Indicadores de graduación y titulación
      description: Se recoge y analiza información sobre indicadores de graduación y titulación. (ID25, ID28, ID29).
      annotation: |-
        📖 Fuente: Criterio 8.5, p. 60.

        📊 Indicadores asociados:
           ID25 — Tiempo promedio entre egreso y titulación (referencial ID25 ≤ 2 años).
           ID28 — Porcentaje de estudiantes que han alcanzado el título profesional, dentro de los dos años posteriores a su egreso (referencial ID28 ≥ 60%).
           ID29 — Porcentaje de empleadores satisfechos con el desempeño de los egresados (referencial ID29 ≥ 70%).

        💬 Se analizan los indicadores de graduación y titulación.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e8.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e8
      ref_id: '8.6'
      name: Información accesible para decisiones
      description: La información registrada, a la que hace referencia los criterios [sic] 8.2, 8.3, 8.4, y 8.5 se encuentra accesible para el personal directivo y docente encargado de tomar decisiones sobre la gestión de mejoras al programa de estudios.
      annotation: |-
        📖 Fuente: Criterio 8.6, p. 60.

        💬 La información analizada está accesible para quienes deciden las mejoras.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e9.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e9
      ref_id: '9.1'
      name: Evaluación periódica del currículo
      description: El currículo se evalúa periódicamente, en relación con los contenidos establecidos en los criterios 2.1 y 2.2. Los resultados de la evaluación curricular son utilizados para su actualización.
      annotation: |-
        📖 Fuente: Criterio 9.1, p. 61.

        ⚖️ Referencia legal: Ley 30220, Ley Universitaria, art. 40 (Diseño curricular).

        💬 El currículo se revisa periódicamente (frente a 2.1 y 2.2) y se actualiza.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e9.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e9
      ref_id: '9.2'
      name: Registro histórico de cambios curriculares
      description: Los cambios curriculares son documentados y se lleva un registro histórico de los mismos.
      annotation: |-
        📖 Fuente: Criterio 9.2, p. 61.

        💬 Los cambios del currículo se documentan y quedan registrados.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e9.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e9
      ref_id: '9.3'
      name: Supervisión de actividades lectivas
      description: Se supervisa la ejecución de las actividades lectivas planificadas y se toman acciones para asegurar su cumplimiento. (ID11).
      annotation: |-
        📖 Fuente: Criterio 9.3, p. 61.

        📊 Indicadores asociados:
           ID11 — Porcentaje de cumplimiento de los sílabos (referencial ID11 ≥ 90%).

        💬 Se supervisa que las clases planificadas se ejecuten y se corrige lo que falta.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e10.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e10
      ref_id: '10.1'
      name: Diseño del SGC
      description: El diseño del sistema de gestión de la calidad considera una política de calidad, las instancias para la toma de decisiones sobre el programa y los procesos involucrados.
      annotation: |-
        📖 Fuente: Criterio 10.1, p. 62.

        💬 El SGC define política de calidad, instancias de decisión y procesos.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e10.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e10
      ref_id: '10.2'
      name: Procesos mínimos del SGC
      description: 'El sistema de gestión de la calidad considera, como mínimo, procesos orientados a: diseño, evaluación y modificación curricular; gestión docente; enseñanza aprendizaje, mantenimiento de infraestructura y equipamiento; evaluación del aprendizaje; seguimiento y vinculación con egresados (o graduados); relación con las partes interesadas, gestión de riesgos, gestión de la información y transparencia.'
      annotation: |-
        📖 Fuente: Criterio 10.2, p. 62.

        💬 El SGC cubre como mínimo los procesos clave del programa (currículo, docentes, egresados, riesgos, información).
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e10.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e10
      ref_id: '10.3'
      name: Registro histórico de cambios del SGC
      description: Los cambios en el sistema de gestión de la calidad son documentados y se lleva un registro histórico de los mismos.
      annotation: |-
        📖 Fuente: Criterio 10.3, p. 62.

        💬 Los cambios del SGC se documentan y quedan registrados.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e10.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e10
      ref_id: '10.4'
      name: Evaluación y mejora del SGC
      description: Se evalúa periódicamente el funcionamiento del sistema de gestión de la calidad y se proponen acciones de mejora.
      annotation: |-
        📖 Fuente: Criterio 10.4, p. 62.

        💬 El funcionamiento del SGC se evalúa periódicamente para mejorarlo.
  reference_controls:
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id1
    ref_id: ID1
    name: Porcentaje de estudiantes satisfechos con el currículo
    category: process
    description: |-
      Tipo de dato: Porcentaje. Estándar(es): Estándar 2 CURRÍCULO · Estándar 3 EVALUACIÓN DE LA ENSEÑANZA, EL APRENDIZAJE Y DEL LOGRO DEL PERFIL DE EGRESO · Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 2.1, Criterio 3.1, Criterio 8.2.

      OBJETIVO DE MEDICIÓN: Medir el porcentaje de estudiantes del programa de estudios satisfechos con el currículo

      VALOR REFERENCIAL / UMBRAL: ID1 ≥ 60% (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID1 igual o mayor a 60% evidencia que el currículo resulta satisfactorio para los estudiantes del programa

      FUENTE DE INFORMACIÓN: Registro de resultados de consulta dirigida a estudiantes

      VARIABLES: EPSC: Total de estudiantes del programa de estudios satisfechos con el currículo · EPR: Total de estudiantes del programa de estudios que respondieron la consulta

      FORMA DE CÁLCULO: (EPSC / EPR) × 100

      PERIODICIDAD (frecuencia de cálculo): Anual

      NOTAS: La consulta considera a estudiantes del programa de estudios que cursan los dos últimos ciclos de su formación al momento de la consulta. Los estudiantes encuestados deben representar, por lo menos, el 70% de los matriculados.

      📖 Fuente: Ficha ID1, p. 65 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id2
    ref_id: ID2
    name: Porcentaje de estudiantes satisfechos con el desempeño docente
    category: process
    description: |-
      Tipo de dato: Porcentaje. Estándar(es): Estándar 4 PLANA DOCENTE · Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 4.2, Criterio 4.3, Criterio 4.4, Criterio 8.2 Criterio 8.3 [sic, sin coma].

      OBJETIVO DE MEDICIÓN: Medir el porcentaje de estudiantes del programa de estudios satisfechos con el desempeño pedagógico de los docentes

      VALOR REFERENCIAL / UMBRAL: ID2 ≥ 70% (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID2 igual o mayor 70% evidencia que el desempeño docente resulta satisfactorio para los estudiantes del programa de estudios

      FUENTE DE INFORMACIÓN: Registro de resultados de consulta dirigida a estudiantes

      VARIABLES: EPSDD: Total de estudiantes del programa de estudios satisfechos con el desempeño pedagógico de los docentes · EPR: Total de estudiantes del programa de estudios que respondieron la consulta

      FORMA DE CÁLCULO: (EPSDD / EPR) × 100

      PERIODICIDAD (frecuencia de cálculo): Semestral

      NOTAS: Los estudiantes encuestados deben representar, por lo menos, el 70% de los matriculados.

      📖 Fuente: Ficha ID2, p. 66 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id3
    ref_id: ID3
    name: Porcentaje de estudiantes satisfechos con los recursos requeridos para el desarrollo de las actividades de enseñanza - aprendizaje
    category: process
    description: |-
      Tipo de dato: Porcentaje. Estándar(es): Estándar 3 EVALUACIÓN DE LA ENSEÑANZA, EL APRENDIZAJE Y DEL LOGRO DEL PERFIL DE EGRESO · Estándar 5 RECURSOS PARA LA ENSEÑANZA - APRENDIZAJE · Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 3.1, Criterio 5.1, Criterio 5.2, Criterio 5.3, Criterio 5.5, Criterio 8.2.

      OBJETIVO DE MEDICIÓN: Medir el porcentaje de estudiantes del programa de estudios satisfechos con los recursos requeridos para el desarrollo de las actividades de enseñanza - aprendizaje

      VALOR REFERENCIAL / UMBRAL: ID3 ≥ 70% (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID3 igual o mayor a 70% evidencia que los recursos requeridos para el desarrollo de las actividades de enseñanza - aprendizaje resultan satisfactorios para los estudiantes del programa.

      FUENTE DE INFORMACIÓN: Registro de resultados de consulta dirigida a estudiantes

      VARIABLES: EPSREA: Total de estudiantes del programa de estudios satisfechos con los recursos requeridos para el desarrollo de las actividades de enseñanza - aprendizaje · EPR: Total de estudiantes del programa de estudios que respondieron la consulta

      FORMA DE CÁLCULO: (EPSREA / EPR) × 100

      PERIODICIDAD (frecuencia de cálculo): Semestral

      NOTAS: Debe preguntarse por cada uno de los recursos requeridos para el desarrollo de las actividades de enseñanza - aprendizaje incluyen [sic]: i) la infraestructura de aulas, laboratorios, talleres y otros ambientes; ii) el equipamiento y mobiliario respectivo; iii) tecnologías de información y comunicación; y iv) recursos académicos de referencia físicos y virtuales (libros, revistas, bases de datos). Los estudiantes encuestados deben representar, por lo menos, el 70% de los matriculados.

      📖 Fuente: Ficha ID3, p. 67 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id4
    ref_id: ID4
    name: Porcentaje de estudiantes satisfechos con la evaluación del aprendizaje
    category: process
    description: |-
      Tipo de dato: Porcentaje. Estándar(es): Estándar 3 EVALUACIÓN DE LA ENSEÑANZA, DEL APRENDIZAJE Y DEL LOGRO DEL PERFIL DE EGRESO [sic, "DEL" en vez de "EL"] · Estándar 4 PLANA DOCENTE · Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 3.1, Criterio 3.2, Criterio 3.3, Criterio 3.4, Criterio 4.1, Criterio 8.2, Criterio 8.4.

      OBJETIVO DE MEDICIÓN: Medir el porcentaje de estudiantes del programa de estudios satisfechos con la evaluación del aprendizaje

      VALOR REFERENCIAL / UMBRAL: ID4 ≥ 60% (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID4 igual o mayor a 70% evidencia que la evaluación del aprendizaje resulta satisfactoria para los estudiantes del programa [sic — el valor referencial dice 60% y la interpretación 70%: inconsistencia interna del original]

      FUENTE DE INFORMACIÓN: Registro de resultados de consulta dirigida a estudiantes

      VARIABLES: EPSEA: Total de estudiantes del programa de estudios satisfechos con la evaluación del aprendizaje · EPR: Total de estudiantes del programa de estudios que respondieron la consulta

      FORMA DE CÁLCULO: (EPSEA / EPR) × 100

      PERIODICIDAD (frecuencia de cálculo): Semestral

      NOTAS: Los estudiantes encuestados deben representar, por lo menos, el 70% de los matriculados.

      📖 Fuente: Ficha ID4, p. 68 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id5
    ref_id: ID5
    name: Porcentaje de estudiantes satisfechos con las actividades de asesoría y/o tutoría para la obtención del título profesional
    category: process
    description: |-
      Tipo de dato: Porcentaje. Estándar(es): Estándar 3 EVALUACIÓN DE LA ENSEÑANZA, DEL APRENDIZAJE Y DEL LOGRO DEL PERFIL DE EGRESO · Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 3.5, Criterio 8.2.

      OBJETIVO DE MEDICIÓN: Medir la satisfacción de los estudiantes del programa de estudios respecto de las actividades de asesoría y/o tutoría para la elaboración de tesis o trabajo de suficiencia profesional.

      VALOR REFERENCIAL / UMBRAL: ID5 ≥ 70% (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID5 igual o mayor a 70% evidencia que las actividades de asesoría y/o tutoría resultan satisfactorias para los estudiantes del programa

      FUENTE DE INFORMACIÓN: Registro de resultados de consulta dirigida a estudiantes

      VARIABLES: EPSAT: Total de estudiantes del programa de estudios satisfechos con las actividades de asesoría y/o tutoría en las que han participado · EPR: Total de estudiantes del programa de estudios que respondieron la consulta

      FORMA DE CÁLCULO: (EPSAT / EPR) × 100

      PERIODICIDAD (frecuencia de cálculo): Semestral

      NOTAS: La consulta considera a estudiantes del programa de estudios que cursan los dos últimos ciclos de su formación al momento de la consulta. Los estudiantes encuestados deben representar, por lo menos, el 70% de los matriculados.

      📖 Fuente: Ficha ID5, p. 69 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id6
    ref_id: ID6
    name: Evolución del porcentaje de postulantes al programa de estudios
    category: process
    description: |-
      Tipo de dato: Porcentaje. Estándar(es): Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 8.2.

      OBJETIVO DE MEDICIÓN: Medir la evolución de la cantidad de postulantes al programa de estudios

      VALOR REFERENCIAL / UMBRAL: ID6 ≥ 0% (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID6 igual o mayor a 0% evidencia un aumento en la cantidad de postulantes al programa. Un valor menor, no significa una evaluación deficiente necesariamente, sin embargo, deben analizarse las causas del comportamiento, tales como, aumento de la oferta de otras instituciones, grado de satisfacción de los estudiantes, etc.

      FUENTE DE INFORMACIÓN: Registros de postulantes (proceso de admisión)

      VARIABLES: CPPU: Cantidad de postulantes al programa de estudios del último año · CPPP: Cantidad de postulantes al programa de estudios del penúltimo año

      FORMA DE CÁLCULO: ((CPPU − CPPP) / CPPP) × 100

      PERIODICIDAD (frecuencia de cálculo): Anual

      NOTAS: De contar con más de una convocatoria de admisión durante un año, la cantidad de postulantes al programa de estudios debe consolidarse para realizar el cálculo.

      📖 Fuente: Ficha ID6, p. 70 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id7
    ref_id: ID7
    name: Porcentaje de estudiantes satisfechos con los programas de bienestar y actividades recreativas, culturales, artísticas y deportivas al estudiante
    category: process
    description: |-
      Tipo de dato: Porcentaje. Estándar(es): Estándar 7 BIENESTAR Y SERVICIOS DE APOYO AL ESTUDIANTE · Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 7.4, Criterio 8.2.

      OBJETIVO DE MEDICIÓN: Medir el porcentaje de estudiantes del programa de estudios satisfechos con cada uno de los programas de bienestar y actividades recreativas, culturales, artísticas y deportivas para el estudiante del programa de estudios.

      VALOR REFERENCIAL / UMBRAL: ID7 ≥ 70% (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID7 igual o mayor a 70% evidencia que los programas de bienestar y actividades recreativas, culturales, artísticas y deportivas resultan satisfactorios para los estudiantes del programa de estudios.

      FUENTE DE INFORMACIÓN: Registro de resultados de consulta dirigida a estudiantes

      VARIABLES: EPSB: Total de estudiantes del programa de estudios satisfechos con los servicios de bienestar y actividades recreativas, culturales, artísticas y deportivas · EPR: Total de estudiantes del programa de estudios que respondieron la consulta

      FORMA DE CÁLCULO: (EPSB / EPR) × 100

      PERIODICIDAD (frecuencia de cálculo): Semestral

      NOTAS: Los estudiantes encuestados deben representar, por lo menos, el 70% de los matriculados y los resultados son individuales por cada uno de los programas y actividades recreativas, culturales, artísticas y deportivas brindadas al estudiante.

      📖 Fuente: Ficha ID7, p. 71 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id8
    ref_id: ID8
    name: Porcentaje de estudiantes satisfechos con los procedimientos de los servicios administrativos
    category: process
    description: |-
      Tipo de dato: Porcentaje. Estándar(es): Estándar 1 GESTIÓN DEL PROGRAMA DE ESTUDIOS · Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 1.5, Criterio 8.2.

      OBJETIVO DE MEDICIÓN: Medir el porcentaje de estudiantes del programa de estudios satisfechos con los procedimientos de los servicios administrativos: matrícula, convalidaciones, constancias académicas, etc.

      VALOR REFERENCIAL / UMBRAL: ID8 ≥ 60% (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID8 igual o mayor a 60% evidencia que los procedimientos de los servicios administrativos resultan satisfactorios para los estudiantes del programa

      FUENTE DE INFORMACIÓN: Registro de resultados de consulta dirigida a estudiantes

      VARIABLES: EPSPA: Total de estudiantes del programa de estudios satisfechos con los procedimientos de los servicios administrativos · EPR: Total de estudiantes del programa de estudios que respondieron la consulta

      FORMA DE CÁLCULO: (EPSPA / EPR) × 100

      PERIODICIDAD (frecuencia de cálculo): Semestral

      NOTAS: Los procedimientos de los servicios administrativos están referidos a: matrícula, convalidaciones, constancias académicas, etc. Los estudiantes encuestados deben representar, por lo menos, el 70% de los matriculados.

      📖 Fuente: Ficha ID8, p. 72 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id9
    ref_id: ID9
    name: Porcentaje de estudiantes satisfechos con los servicios de apoyo pedagógico para la mejora del desempeño académico de los estudiantes
    category: process
    description: |-
      Tipo de dato: Porcentaje. Estándar(es): Estándar 3 EVALUACIÓN DE LA ENSEÑANZA, DEL APRENDIZAJE Y DEL LOGRO DEL PERFIL DE EGRESO · Estándar 7 BIENESTAR Y SERVICIOS DE APOYO AL ESTUDIANTE · Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 3.5, Criterio 7.4, Criterio 8.2.

      OBJETIVO DE MEDICIÓN: Medir la satisfacción de los estudiantes del programa de estudios respecto de los servicios de orientación y apoyo pedagógico (psicopedagogía, tutoría y/o asesoría⁷, consejería y otros que el programa ofrezca) en los que participaron. — Nota al pie 7: "Además de la tutoría y/o asesoría para la elaboración de las tesis o trabajos de investigación, los programas pueden desarrollar este tipo de actividades para la nivelación y mejora del desempeño de los estudiantes."

      VALOR REFERENCIAL / UMBRAL: ID9 ≥ 70% (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID9 igual o mayor a 70% evidencia que los servicios de orientación y tutoría resultan satisfactorias [sic] para los estudiantes del programa

      FUENTE DE INFORMACIÓN: Registro de resultados de consulta dirigida a estudiantes

      VARIABLES: EPSAP: Total de estudiantes del programa de estudios satisfechos con el servicio de apoyo pedagógico (psicopedagogía, tutoría y/o asesoría, consejería y otros que el programa ofrezca) en el que han participado. · EPSAR: Total de estudiantes del programa de estudios que participaron el servicio de pedagógico (psicopedagogía pedagogía, tutoría y/o asesoría, consejería y otros que el programa ofrezca) [sic] y que respondieron la consulta.

      FORMA DE CÁLCULO: (EPSAP / EPSAR) × 100

      PERIODICIDAD (frecuencia de cálculo): Semestral

      NOTAS: La consulta considera a estudiantes del programa de estudios al momento de su aplicación. Los estudiantes encuestados deben representar, por lo menos, el 70% de los matriculados y los resultados son individuales por cada uno de los servicios de apoyo brindados a estos.

      📖 Fuente: Ficha ID9, p. 73 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id10
    ref_id: ID10
    name: Porcentaje de estudiantes aprobados por asignatura
    category: process
    description: |-
      Tipo de dato: Porcentaje. Estándar(es): Estándar 3 EVALUACIÓN DE LA ENSEÑANZA, DEL APRENDIZAJE Y DEL LOGRO DEL PERFIL DE EGRESO · Estándar 6 RESPONSABILIDAD SOCIAL UNIVERSITARIA · Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterios 3.1 [sic], Criterio 6.1, Criterio 8.4.

      OBJETIVO DE MEDICIÓN: - Evaluar la efectividad de los procesos de enseñanza aprendizaje y el nivel de logro académico de los estudiantes en cada asignatura. - Identificar asignaturas con bajo rendimiento, áreas de mejora en el currículo, y la necesidad de implementar estrategias de apoyo para los estudiantes.

      VALOR REFERENCIAL / UMBRAL: ID10 ≥ 80% (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID10 igual o mayor a 80% evidencia un mejor resultado en los procesos formativos, sin embargo, deben considerarse los niveles de complejidad de las diferentes asignaturas, la evolución semestral del indicador etc. En los casos que no se alcanza ese valor, pero la evolución es positiva, entonces debe considerarse como un resultado satisfactorio.

      FUENTE DE INFORMACIÓN: Registro de calificaciones (por asignatura) de estudiantes del programa de estudios

      VARIABLES: EPCAA: Total de estudiantes del programa de estudios con calificación aprobatoria en la asignatura al término del semestre · TEMA: Total de estudiantes del programa de estudios matriculados en la asignatura

      FORMA DE CÁLCULO: (EPCAA / TEMA) × 100

      PERIODICIDAD (frecuencia de cálculo): Semestral

      NOTAS: La ecuación se aplica a cada una de las asignaturas del programa de estudios. El registro de la información considera a todos los estudiantes del programa de estudios matriculados en el semestre de cálculo.

      📖 Fuente: Ficha ID10, p. 74 del Modelo CONEAU 2025.
