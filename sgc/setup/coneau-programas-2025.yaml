      ref_id: '4.5'
      name: Fortalecimiento de capacidades docentes
      description: Se llevan a cabo y se evalúan actividades de fortalecimiento de capacidades y de desarrollo académico que garantizan el perfeccionamiento continuo y la innovación pedagógica de los docentes. Estas actividades son diseñadas sobre la base de los resultados de evaluación de desempeño y las necesidades del programa. Se incluyen en los planes de capacitación del programa, de la facultad o de la universidad. En los casos en que los programas se desarrollen en las modalidades semipresencial o a distancia, se realizan las capacitaciones necesarias para garantizar el dominio, por parte de los docentes, de las competencias informáticas y pedagógicas necesarias para su desempeño óptimo en esas modalidades. (ID15, ID16)
