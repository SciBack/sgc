    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:root
      ref_id: E5
      name: RECURSOS PARA LA ENSEÑANZA - APRENDIZAJE
      description: Los recursos requeridos para el desarrollo de las actividades de enseñanza - aprendizaje considerados en el currículo, se encuentran a disposición de docentes y estudiantes, de manera oportuna.
      annotation: |-
        📖 Fuente: Estándar 5, p. 57 del Modelo CONEAU 2025.

        📎 Evidencias del estándar (fuentes de verificación, p. 57):
        EV30: Informe y documentación sustentadora de la infraestructura, equipamiento, mobiliario y tecnologías de información y comunicación utilizados en las actividades de formación profesional del programa de estudios, y fundamentación sobre su coherencia con las disciplinas que componen el currículo. Se especifica aquella que se utiliza para las modalidades semipresencial y/o a distancia. (criterios 5.1, 5.2 y 5.3) (ID3, ID17)
        EV31: Protocolos, guías, manuales u otros medios referidos en el criterio 5.4
        EV32: Suscripciones a bases de datos bibliográficas, catálogos de la biblioteca y hemeroteca a las que tienen acceso los docentes y estudiantes del programa de estudios. (criterio 5.5)
        EV33: Plan de mantenimiento de la infraestructura y equipamiento, o documento similar, e información sobre su cumplimiento. (criterio 5.6)

        💬 Valoración por estándar en 3 niveles (NL=0 / L=1 / LP=2), analizando sus criterios e indicadores asociados.
      reference_controls:
