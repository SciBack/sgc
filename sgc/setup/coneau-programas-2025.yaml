      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:root
      ref_id: E7
      name: BIENESTAR Y SERVICIOS DE APOYO AL ESTUDIANTE
      description: La institución a la que pertenece el programa de estudios pone a disposición de los estudiantes, personal docente y no docente, programas de bienestar y actividades recreativas, culturales, artísticas y deportivas. Asimismo, dispone de servicios de apoyo para la mejora del desempeño y formación del estudiante. Estos programas son evaluados periódicamente y se mejoran de manera continua.
      annotation: |-
        📖 Fuente: Estándar 7, p. 59 del Modelo CONEAU 2025.

        📎 Evidencias del estándar (fuentes de verificación, p. 59):
        EV37: Informe y documentación sobre los resultados de los servicios bienestar [sic] y la satisfacción del estudiante.
        EV38: Informe y documentación sobre los resultados de los servicios de apoyo (criterio 7.2) y su impacto en la mejora del desempeño y formación del estudiante.
        EV39: Informe y documentación sobre acciones o planes de mejora implementados a partir de los resultados obtenidos, según corresponda.

        💬 Valoración por estándar en 3 niveles (NL=0 / L=1 / LP=2), analizando sus criterios e indicadores asociados.
