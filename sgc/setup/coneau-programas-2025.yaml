    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:root
      ref_id: E3
      name: EVALUACIÓN DE LA ENSEÑANZA, EL APRENDIZAJE Y DEL LOGRO DEL PERFIL DE EGRESO
      description: Se evalúa la calidad de la enseñanza, así como la progresión del desempeño académico de los estudiantes, para determinar en qué medida se cumple con las competencias/objetivos u otro enfoque establecido en el perfil del egresado, y se implementan actividades de orientación y apoyo para alcanzarlos. Se consideran las diferentes necesidades de aprendizaje.
      annotation: |-
        📖 Fuente: Estándar 3, p. 53 del Modelo CONEAU 2025.

        📎 Evidencias del estándar (fuentes de verificación, p. 53):
        EV12: Documentos que norman los mecanismos e instrumentos de evaluación de la calidad de la enseñanza, informes sobre su aplicación, de los resultados obtenidos y sugerencias para la mejora, de acuerdo con el criterio 3.1.
        EV13: Documento(s) que orienta(n) y regula(n) la evaluación del estudiante, de acuerdo con los criterios 3.2 y 3.3.
        EV14: Documento(s) que norma(n) las actividades de asesoría y/o tutoría de los estudiantes e informe sobre prácticas realizadas, durante los últimos dos semestres anteriores a la presentación del informe de autoevaluación con fines de acreditación.
        EV15: En los casos que corresponda, documento(s) que norma(n) las prácticas pre profesionales y su supervisión, e información de su aplicación durante los dos (2) semestres anteriores a la presentación del informe de autoevaluación con fines de acreditación. Incluye información sobre la proporción de estudiantes que participaron en estas prácticas.
        EV16: Normas que establecen los requerimientos definidos en el criterio 3.7, informe de incidencias y acciones desarrolladas en esos casos, de los últimos dos semestres anteriores a la presentación del informe de autoevaluación con fines de acreditación.
        EV17: Informe de la evolución del desempeño de los estudiantes, con base a la evolución de los siguientes indicadores, en los últimos cuatro semestres o dos años: ID10: Porcentaje de estudiantes aprobados por asignatura; ID28: Porcentaje de estudiantes que han alcanzado el título profesional, dentro de los dos años posteriores a su egreso
        EV18: Resultados de programas o actividades de asesoría y/o tutoría realizados durante los dos (2) semestres anteriores a la presentación del informe de autoevaluación. Especificar objetivos, actividades realizadas y cantidad de participantes.
        EV19: Relación de tesis y trabajos de suficiencia profesional sustentadas por los titulados, durante los dos (2) años anteriores a la presentación del informe de autoevaluación, que obran en el repositorio.

        💬 Valoración por estándar en 3 niveles (NL=0 / L=1 / LP=2), analizando sus criterios e indicadores asociados.
