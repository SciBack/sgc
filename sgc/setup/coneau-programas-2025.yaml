      description: 'Se evalúa el desempeño de los docentes de manera periódica (semestral/anual) y se les informa de sus resultados oportunamente. Entre los criterios de evaluación deben considerarse, por lo menos: • Desempeño pedagógico • Cumplimiento de las normas institucionales • Cumplimiento de los sílabos — Los instrumentos de evaluación deben considerar, como mínimo, la autoevaluación, opinión de los estudiantes y de la dirección del programa o del departamento académico, según corresponda. (ID2, ID15, ID16, ID19)'
