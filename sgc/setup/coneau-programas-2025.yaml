    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:root
      ref_id: E2
      name: CURRÍCULO
      description: El currículo se diseña con la debida fundamentación y garantiza el perfil del egresado
      annotation: |-
        📖 Fuente: Estándar 2, p. 51 del Modelo CONEAU 2025.

        📎 Evidencias del estándar (fuentes de verificación, p. 52):
        EV8: Todos los documentos que se enuncian en el criterio 2.1 como componentes del currículo y su fundamentación.
        EV9: Sílabos de las asignaturas
        EV10: Informe de cumplimiento semestral de los sílabos, el cual contiene: procedimiento de verificación, porcentajes de cumplimiento y acciones emprendidas para disminuir o eliminar esa situación.
        EV11: Documento(s) que establece(n) el procedimiento de convalidación y/o reconocimiento de créditos, que hayan obtenidos [sic] en otras instituciones o por otras actividades no lectivas.

        💬 Valoración por estándar en 3 niveles (NL=0 / L=1 / LP=2), analizando sus criterios e indicadores asociados.
      reference_controls:
