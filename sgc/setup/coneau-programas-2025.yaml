      name: SUPERVISIÓN Y REVISIÓN DEL PROGRAMA DE ESTUDIOS
      description: Se utiliza la información de la gestión y resultados del programa para realizar mejoras.
      annotation: |-
        📖 Fuente: Estándar 9, p. 61 del Modelo CONEAU 2025.

        📎 Evidencias del estándar (fuentes de verificación, p. 61):
        EV45: Documentos que norman la revisión del currículo.
        EV46: Informe sobre la ejecución de los procesos de actualización curricular y documentación sustentadora.
        EV47: Registro histórico de cambios curriculares.
        EV48: Informe y documentación sustentadora de las acciones de supervisión de ejecución de las actividades lectivas, propuestas de mejora realizadas y ejecutadas.

        💬 Valoración por estándar en 3 niveles (NL=0 / L=1 / LP=2), analizando sus criterios e indicadores asociados.
      reference_controls:
      - urn:intuitem:risk:function:coneau-programas-2025:id11
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:root
      ref_id: E10
      name: GESTIÓN DE LA CALIDAD
      description: Se cuenta con un sistema de gestión de la calidad en diseño y/o implementado a nivel de programa o a nivel institucional, con alcance al programa.
      annotation: |-
        📖 Fuente: Estándar 10, p. 62 del Modelo CONEAU 2025.

        📎 Evidencias del estándar (fuentes de verificación, p. 62):
        EV49: Documentos que den cuenta del diseño y/o implementación del sistema de gestión de la calidad: manual de calidad, plan(es) de implementación, resultados de implementación, según corresponda.
        EV50: Información sobre los procesos incluidos en el sistema de gestión de la calidad.
        EV51: Registro histórico de cambios al sistema de gestión de la calidad.
        EV52: Resultados de evaluación del funcionamiento del sistema de gestión de la calidad, y acciones de mejora propuestas e implementadas.

        💬 Valoración por estándar en 3 niveles (NL=0 / L=1 / LP=2), analizando sus criterios e indicadores asociados.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e1
      ref_id: '1.1'
      name: Estructura interna en Reglamento/MOF
      description: El programa cuenta con una estructura interna pertinente, que se detalla en su Reglamento y/o Manual de Organización y Funciones o en el de la universidad.
      annotation: |-
        📖 Fuente: Criterio 1.1, p. 50.

        💬 La organización del programa debe estar formalizada en el Reglamento o MOF.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e1
      ref_id: '1.2'
      name: Cuerpo directivo competente
      description: La gestión del programa de estudios está a cargo de un cuerpo directivo, que cuenta con los requisitos de la Ley Universitaria, en los casos que corresponde, así como con la formación y experiencia y otras características requeridas en el Reglamento y/o Manual de Organización y Funciones.
      annotation: |-
        📖 Fuente: Criterio 1.2, p. 50.

        ⚖️ Referencia legal: Ley 30220, Ley Universitaria (requisitos del cuerpo directivo).

        💬 Quienes dirigen el programa cumplen los requisitos de la Ley Universitaria y del MOF.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e1
      ref_id: '1.3'
      name: Planes estratégicos y operativos con evaluación anual
      description: El programa de estudios gestiona su accionar con base en planes estratégicos, y operativos, propios o de la facultad a la cual pertenecen. Estos planes incluyen, entre otros, objetivos académicos definidos y cuyo grado de cumplimiento es evaluado, por lo menos, con periodicidad anual, utilizando los indicadores que correspondan.
      annotation: |-
        📖 Fuente: Criterio 1.3, p. 50.

        💬 El programa planifica y evalúa el cumplimiento de sus objetivos al menos una vez al año.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e1.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e1
      ref_id: '1.4'
      name: Gestión de quejas y reclamos
      description: El programa gestiona las quejas, reclamos y denuncias emitidos por los miembros de la comunidad universitaria, por medio del Libro de Reclamaciones o ante la Defensoría Universitaria, y los atiende en la medida que sean pertinentes.
      annotation: |-
        📖 Fuente: Criterio 1.4, p. 50.

        ⚖️ Referencia legal: Ley 29571, Código de Protección y Defensa del Consumidor (Libro de Reclamaciones); Ley 30220, Ley Universitaria (Defensoría Universitaria).

        💬 Existe un canal formal (Libro de Reclamaciones/Defensoría) para atender quejas.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e1.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e1
      ref_id: '1.5'
      name: Satisfacción con servicios administrativos
      description: Se evalúa la satisfacción de los estudiantes, docentes y egresados con los procedimientos de los servicios administrativos. (ID8, ID18, ID21)
      annotation: |-
        📖 Fuente: Criterio 1.5, p. 50.

        📊 Indicadores asociados:
           ID8 — Porcentaje de estudiantes satisfechos con los procedimientos de los servicios administrativos (referencial ID8 ≥ 60%).
           ID18 — Porcentaje de docentes satisfechos con los procedimientos de los servicios administrativos (referencial ID18 ≥ 75%).
           ID21 — Porcentaje de egresados satisfechos con los procedimientos de los servicios administrativos (referencial ID21 ≥ 70%).

        💬 Se mide qué tan satisfechos están estudiantes, docentes y egresados con los trámites administrativos.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e2
      ref_id: '2.1'
      name: Contenido mínimo del currículo
      description: 'El currículo contiene, como mínimo: a. Datos generales del programa de estudios (denominación, grado y título que otorga, modalidad, resolución de aprobación, entre otros). b. Fundamentación, en la que se plantean: alineamiento con el modelo educativo, políticas curriculares u otros documentos que, explícitamente, establezcan los lineamientos institucionales para su elaboración y gestión; tendencias nacionales e internacionales del ejercicio profesional, del desarrollo científico y tecnológico en su campo, así como de los propios procesos formativos. Del mismo modo, deben enunciarse los aspectos deontológicos y las normativas aplicables al ejercicio profesional, en caso los hubiera. En este proceso, se toman en cuenta las opiniones de empleadores, egresados, estudiantes y docentes, además de otras partes interesadas que se consideren pertinentes. c. Justificación del enfoque pedagógico del programa (competencias/objetivos u otro enfoque que resulte pertinente). d. Perfil del ingresante e. Perfil de egreso (o perfil de egresado) f. Plan de estudios g. Procedimientos generales y estrategias de formación, evaluación del aprendizaje y de las competencias/objetivos u otro enfoque incluidos en el perfil del egresado. — Si el programa es ofrecido en modalidad semipresencial y/o a distancia, el currículo debe incluir la justificación metodológica sobre la pertinencia de dicha(s) modalidad(es) respecto de: a. La pertinencia didáctica de la modalidad a distancia, para cada una de las asignaturas o para las disciplinas en conjunto, en las cuales se aplica. b. La pertinencia para el logro de las competencias, capacidades u objetivos, según corresponda, para cada una las asignaturas [sic] o para las disciplinas en conjunto, en las cuales se aplica. (ID1, ID12)'
      annotation: |-
        📖 Fuente: Criterio 2.1, p. 51.

        📎 Evidencias relacionadas: EV8.

        📊 Indicadores asociados:
           ID1 — Porcentaje de estudiantes satisfechos con el currículo (referencial ID1 ≥ 60%).
           ID12 — Porcentaje de docentes satisfechos con el currículo (referencial ID12 ≥ 70%).

        💬 Define los componentes obligatorios del documento curricular (datos, fundamentación, perfiles, plan de estudios).
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e2
      ref_id: '2.2'
      name: Perfil de egreso por competencias
      description: El perfil de egreso comprende las competencias genéricas y específicas propias de un profesional que ha culminado exitosamente el programa; así como las actitudes y valores que deben formarse. En lugar de competencias, el perfil puede elaborarse en base a objetivos, capacidades u otro enfoque que resulten pertinentes. Las competencias/objetivos u otro enfoque debe referirse [sic] a las actividades profesionales básicas que deben caracterizar a un egresado y que le permitan incorporarse de manera eficaz al ejercicio profesional; así como a habilidades genéricas relacionadas con su formación y desarrollo personal y social.
      annotation: |-
        📖 Fuente: Criterio 2.2, p. 51.

        💬 El perfil de egreso describe las competencias/objetivos del profesional que forma el programa.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e2.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e2
      ref_id: '2.3'
      name: Contenido mínimo del plan de estudios
      description: 'El plan de estudios comprende, como mínimo: cuadro de asignaturas o cursos o módulos, indicando su naturaleza (general, específica o de especialidad), horas y créditos (de teoría, práctica, lectivos y no lectivos) contabilizados por asignatura, ciclo y total del plan de estudios; malla curricular, las sumillas de las asignaturas, los métodos de enseñanza – aprendizaje, las estrategias de investigación formativa y los procedimientos específicos de evaluación del aprendizaje. En el caso de que el programa sea ofrecido en modalidades distintas a la presencial (semipresencial o a distancia), el currículo debe incluir la justificación metodológica sobre la pertinencia de dicha(s) modalidad(es) para el logro del perfil del egresado.'
      annotation: |-
        📖 Fuente: Criterio 2.3, p. 51.

        💬 El plan de estudios detalla asignaturas, créditos, malla, sumillas y métodos.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e2.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e2
      ref_id: '2.4'
      name: Carga lectiva y no lectiva ≤ 40 horas
      description: El total de horas semanales para los estudiantes en un determinado curso según el plan de estudios debe estar precisado en el sílabo en términos de carga lectiva y carga no lectiva, con el objetivo de evitarles sobrecargas y permitirles disponer de tiempo libre para descansar o para realizar actividades extracurriculares que contribuyan a su formación integral, tales como actividad física, artística, cultural y otras. La suma de la carga lectiva y no lectiva no debe exceder de las cuarenta horas semanales.
      annotation: |-
        📖 Fuente: Criterio 2.4, p. 51.

        💬 La carga total semanal del estudiante no debe superar 40 horas.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e2.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e2
      ref_id: '2.5'
      name: Contenido mínimo de los sílabos
      description: 'Los sílabos de las asignaturas, cursos, módulos, proyectos formativos u otros similares establecen: • Las competencias, objetivos, capacidades u otros componentes del perfil del egreso, que serán tratados en cada una de ellas. • Las actividades de enseñanza aprendizaje. • Los contenidos por desarrollar. • Los productos qu [sic] se deben elaborar (en los casos que se requiera). • Tipos y frecuencia de las evaluaciones, así como mecanismos de ponderación. • Las fuentes de información requerida (bibliografía y otras). — En el caso de que el programa sea ofrecido en más de una modalidad, los sílabos indican aquellas en las que se desarrolla la asignatura, la cantidad de horas que corresponden a esa modalidad, así como las estrategias pedagógicas específicas de estas.'
      annotation: |-
        📖 Fuente: Criterio 2.5, p. 52.

        💬 Cada sílabo debe declarar competencias, actividades, contenidos, evaluación y bibliografía.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e2.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e2
      ref_id: '2.6'
      name: Normas de convalidación de estudios
      description: Existen normas que establecen como [sic] se realiza la convalidación de los estudios cursados por el estudiante en el mismo programa, producto de una actualización del plan de estudios, en otros programas de la misma universidad o de otras instituciones de educación superior, nacionales o extranjeras o entre modalidades.
      annotation: |-
        📖 Fuente: Criterio 2.6, p. 52.

        💬 Hay reglas claras para convalidar estudios entre planes, programas, instituciones o modalidades.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e2.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e2
      ref_id: '2.7'
      name: Cumplimiento de sílabos y acciones correctivas
      description: Existen procedimientos que permiten obtener evidencias acerca del grado de cumplimiento de los sílabos de las asignaturas y se diseñan e implementan acciones que permitan disminuir o eliminar los casos de incumplimiento. (ID11)
      annotation: |-
        📖 Fuente: Criterio 2.7, p. 52.

        📊 Indicadores asociados:
           ID11 — Porcentaje de cumplimiento de los sílabos (referencial ID11 ≥ 90%).

        💬 Se verifica el cumplimiento de los sílabos y se corrigen los incumplimientos.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e3
      ref_id: '3.1'
      name: Evaluación de la calidad de la enseñanza
      description: Existen mecanismos e instrumentos que evalúan la calidad de la enseñanza, desde las perspectivas de los estudiantes y de la dirección del programa, cuyos resultados sirven de sustento para la mejora continua del aprendizaje. (ID1, ID3, ID4, ID10, ID19, ID22)de estudio. (ID4) [sic — cola "de estudio. (ID4)" impresa así en el original]
      annotation: |-
        📖 Fuente: Criterio 3.1, p. 53.

        📎 Evidencias relacionadas: EV12.

        📊 Indicadores asociados:
           ID1 — Porcentaje de estudiantes satisfechos con el currículo (referencial ID1 ≥ 60%).
           ID3 — Porcentaje de estudiantes satisfechos con los recursos requeridos para el desarrollo de las actividades de enseñanza - aprendizaje (referencial ID3 ≥ 70%).
           ID4 — Porcentaje de estudiantes satisfechos con la evaluación del aprendizaje (referencial ID4 ≥ 60%).
           ID10 — Porcentaje de estudiantes aprobados por asignatura (referencial ID10 ≥ 80%).
           ID19 — Porcentaje de docentes con desempeño satisfactorio, en opinión de los estudiantes (referencial ID19 ≥ 75%).
           ID22 — Porcentaje de egresados satisfechos con la calidad de enseñanza (referencial ID22 ≥ 70%).

        💬 Se evalúa la calidad de la enseñanza desde estudiantes y dirección para mejorar el aprendizaje.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e3
      ref_id: '3.2'
      name: Coherencia de la evaluación del estudiante
      description: La evaluación del estudiante (procedimientos, instrumentos, tipos, frecuencia), es coherente con el enfoque pedagógico del programa de estudios, la naturaleza de las asignaturas, los componentes del perfil de egreso, las diversas necesidades de aprendizaje y las modalidades de estudio. (ID4)
      annotation: |-
        📖 Fuente: Criterio 3.2, p. 53.

        📎 Evidencias relacionadas: EV13.

        📊 Indicadores asociados:
           ID4 — Porcentaje de estudiantes satisfechos con la evaluación del aprendizaje (referencial ID4 ≥ 60%).

        💬 La forma de evaluar es coherente con el enfoque pedagógico y el perfil de egreso.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e3
      ref_id: '3.3'
      name: Evidencias de logro del perfil de egreso
      description: Los procedimientos e instrumentos de evaluación del aprendizaje y otros que resulten pertinentes, permiten obtener evidencias acerca de la medida en que los estudiantes van alcanzando las competencias/objetivos u otro enfoque establecido en el perfil de egreso; los resultados son utilizados para el perfeccionamiento del currículo y la mejora continua del programa de estudios. (ID4, ID20)
      annotation: |-
        📖 Fuente: Criterio 3.3, p. 53.

        📎 Evidencias relacionadas: EV13.

        📊 Indicadores asociados:
           ID4 — Porcentaje de estudiantes satisfechos con la evaluación del aprendizaje (referencial ID4 ≥ 60%).
           ID20 — Porcentaje de egresados satisfechos con la calidad y utilidad de la formación recibida, para su empleabilidad (referencial ID20 ≥ 70%).

        💬 La evaluación evidencia el logro del perfil de egreso y alimenta la mejora del currículo.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e3.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e3
      ref_id: '3.4'
      name: Información oportuna al estudiante
      description: El estudiante es informado oportunamente acerca de los criterios de evaluación y de los resultados de su desempeño académico. (ID4)
      annotation: |-
        📖 Fuente: Criterio 3.4, p. 53.

        📊 Indicadores asociados:
           ID4 — Porcentaje de estudiantes satisfechos con la evaluación del aprendizaje (referencial ID4 ≥ 60%).

        💬 El estudiante conoce a tiempo los criterios de evaluación y sus resultados.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e3.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e3
      ref_id: '3.5'
      name: Tutoría y asesoría
      description: Existen programas o actividades de tutoría y/o asesoría, que se desarrollan de manera oportuna y contribuyen a la mejora del desempeño académico de los estudiantes y para la elaboración de los trabajos de investigación, las tesis y los trabajos de suficiencia profesional. (ID5, ID9, ID24)
      annotation: |-
        📖 Fuente: Criterio 3.5, p. 53.

        📊 Indicadores asociados:
           ID5 — Porcentaje de estudiantes satisfechos con las actividades de asesoría y/o tutoría para la obtención del título profesional (referencial ID5 ≥ 70%).
           ID9 — Porcentaje de estudiantes satisfechos con los servicios de apoyo pedagógico para la mejora del desempeño académico de los estudiantes (referencial ID9 ≥ 70%).
           ID24 — Porcentaje de egresados satisfechos con los servicios de apoyo al estudiante (referencial ID24 ≥ 70%).

        💬 Existen tutoría y asesoría que apoyan el desempeño académico y la elaboración de tesis.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e3.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e3
      ref_id: '3.6'
      name: Originalidad e integridad de tesis
      description: Las tesis, trabajos de investigación y trabajos de suficiencia profesional muestran originalidad y rigurosidad académica. Existen normas institucionales y/o del programa, que establecen los requisitos y formas que pueden tener esos documentos, así como los principios éticos y de integridad que deben cumplirse en su elaboración y sustentación, en los casos que corresponda. Se supervisa el cumplimiento de estas normas, de manera sistemática, con los procedimientos e instrumentos adecuados, entre ellos los que permitan evaluar la originalidad de los trabajos académicos y de investigación de los estudiantes, así como la ausencia de plagios.
      annotation: |-
        📖 Fuente: Criterio 3.6, p. 53.

        💬 Las tesis son originales y rigurosas; se supervisa la integridad y ausencia de plagio.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e3.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e3
      ref_id: '3.7'
      name: Autoría propia del trabajo académico
      description: Existen regulaciones – procedimientos y/o instrumentos – que garantizan que las evaluaciones, tareas y cualquier trabajo de carácter académico es desarrollado por el propio estudiante y no por otras personas.
      annotation: |-
        📖 Fuente: Criterio 3.7, p. 53.

        📎 Evidencias relacionadas: EV16.

        💬 Se garantiza que el trabajo académico lo hace el propio estudiante.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e4
      ref_id: '4.1'
      name: Selección transparente de docentes
      description: La selección y vinculación de docentes se lleva a cabo de manera transparente e incluye el análisis de información sobre su formación académica y experiencia profesional, para evaluar su adecuación al perfil del egresado definido en el currículo. (ID4, ID14, ID19)
      annotation: |-
        📖 Fuente: Criterio 4.1, p. 55.

        📎 Evidencias relacionadas: EV24.

        📊 Indicadores asociados:
           ID4 — Porcentaje de estudiantes satisfechos con la evaluación del aprendizaje (referencial ID4 ≥ 60%).
           ID14 — Porcentaje de docentes con el grado académico de doctor (referencial ID14 ≥ 20%).
           ID19 — Porcentaje de docentes con desempeño satisfactorio, en opinión de los estudiantes (referencial ID19 ≥ 75%).

        💬 La contratación docente es transparente y evalúa su idoneidad frente al perfil de egreso.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e4
      ref_id: '4.2'
      name: Competencias pedagógicas, disciplinares y digitales
      description: Los docentes demuestran dominio de competencias pedagógicas, disciplinares y digitales esenciales, lo cual asegura la calidad y efectividad del proceso de enseñanza aprendizaje en cualquier modalidad impartida. (ID2, ID19)
      annotation: |-
        📖 Fuente: Criterio 4.2, p. 55.

        📎 Evidencias relacionadas: EV24.

        📊 Indicadores asociados:
           ID2 — Porcentaje de estudiantes satisfechos con el desempeño docente (referencial ID2 ≥ 70%).
           ID19 — Porcentaje de docentes con desempeño satisfactorio, en opinión de los estudiantes (referencial ID19 ≥ 75%).

        💬 Los docentes dominan competencias pedagógicas, disciplinares y digitales.
    - urn: urn:intuitem:risk:req_node:coneau-programas-2025:e4.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:coneau-programas-2025:e4
      ref_id: '4.3'
      name: Asignación de carga lectiva por idoneidad
      description: 'La carga lectiva para las asignaturas generales, específicas y de especialidad se asigna a los docentes, de acuerdo con su experiencia académica en el ejercicio profesional y en la investigación, según corresponda. En ese sentido, los docentes deben cumplir con uno o varios de los siguientes requisitos relacionados con el programa en que se desempeña, la modalidad de estudio o con las asignaturas a su cargo: a. Formación de pregrado o posgrado b. Experiencia profesional (laboral, ya sea como empleado o como profesional independiente). c. Experiencia en investigación, innovación y/o creación cultural y artística. (ID2, ID13, ID14)'
      annotation: |-
