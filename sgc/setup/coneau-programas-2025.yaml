      FORMA DE CÁLCULO: (EPSCE / TEEP) × 100

      PERIODICIDAD (frecuencia de cálculo): Anual

      NOTAS: La consulta considera a egresados del programa de estudios de los últimos cinco (05) años. Para este indicador, la institución determina la muestra y el tratamiento estadístico pertinente.

      📖 Fuente: Ficha ID22, p. 86 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id23
    ref_id: ID23
    name: Porcentaje de egresados satisfechos con los programas de bienestar y actividades recreativas, culturales, artísticas y deportivas
    category: process
    description: |-
      Tipo de dato: Porcentaje. Estándar(es): Estándar 7 BIENESTAR Y SERVICIOS DE APOYO AL ESTUDIANTE · Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 7.4 · Criterio 8.2.

      OBJETIVO DE MEDICIÓN: Medir el porcentaje de egresados del programa de estudios satisfechos con los programas de bienestar y actividades recreativas, culturales, artísticas y deportivas.

      VALOR REFERENCIAL / UMBRAL: ID23 ≥ 70% (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID23 igual o mayor a 70% evidencia que los programas de bienestar y actividades recreativas, culturales, artísticas y deportivas resultan satisfactorios para los egresados del programa.

      FUENTE DE INFORMACIÓN: Registro de resultados de consulta dirigida a egresados

      VARIABLES: EPSB: Egresados del programa de estudios satisfechos con programas de bienestar y actividades recreativas, culturales, artísticas y deportivas. en el que ha participado [sic]. · TEEP: Total de egresados encuestados del programa de estudios

      FORMA DE CÁLCULO: (EPSB / TEEP) × 100

      PERIODICIDAD (frecuencia de cálculo): Anual

      NOTAS: Realizar el cálculo del indicador por cada uno de los programas y actividades ofrecidos. La consulta considera a egresados del programa de estudios de los últimos cinco (05) años. Para este indicador, la institución determina la muestra y el tratamiento estadístico pertinente.

      📖 Fuente: Ficha ID23, p. 87 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id24
    ref_id: ID24
    name: Porcentaje de egresados satisfechos con los servicios de apoyo al estudiante
    category: process
    description: |-
      Tipo de dato: Porcentaje. Estándar(es): Estándar 3 EVALUACIÓN DE LA ENSEÑANZA, DEL APRENDIZAJE Y DEL LOGRO DEL PERFIL DE EGRESO · Estándar 7 BIENESTAR Y SERVICIOS DE APOYO AL ESTUDIANTE · Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 3.5, Criterio 7.2, Criterio 7.4, Criterio 8.2.

      OBJETIVO DE MEDICIÓN: Medir la satisfacción de los egresados del programa de estudios respecto de los servicios de orientación y apoyo (tutoría, psicopedagogía, asesoría, consejería) en los que participaron.

      VALOR REFERENCIAL / UMBRAL: ID24 ≥ 70% (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID24 igual o mayor a 70% evidencia que los servicios de apoyo resultan satisfactorios para los egresados del programa

      FUENTE DE INFORMACIÓN: Registro de resultados de consulta dirigida a egresados

      VARIABLES: EPSSA: Egresados del programa de estudios satisfechos con el servicio de apoyo (tutoría, psicopedagogía, asesoría, consejería) en el que participaron · TEEP: Total de egresados encuestados del programa de estudios

      FORMA DE CÁLCULO: (EPSSA / TEEP) × 100

      PERIODICIDAD (frecuencia de cálculo): Anual

      NOTAS: Realizar el cálculo del indicador por cada uno de los servicios de apoyo ofrecidos. La consulta considera a egresados del programa de estudios de los últimos cinco (05) años. Para este indicador, la institución determina la muestra y el tratamiento estadístico pertinente.

      📖 Fuente: Ficha ID24, p. 88 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id25
    ref_id: ID25
    name: Tiempo promedio entre egreso y titulación
    category: process
    description: |-
      Tipo de dato: Promedio. Estándar(es): Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 8.5.

      OBJETIVO DE MEDICIÓN: Medir el promedio del tiempo transcurrido entre la obtención de la condición de egresado y la obtención del título profesional o licenciatura

      VALOR REFERENCIAL / UMBRAL: ID25 ≤ 2 años (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID25 menor a dos años evidencia que, el tiempo transcurrido entre la obtención de la condición de egresado y la obtención del título profesional o licenciatura, es adecuado.

      FUENTE DE INFORMACIÓN: Registro de egresados del programa de estudios (fecha de egreso, fecha de obtención del título)

      VARIABLES: TETP: Tiempo transcurrido entre la obtención de la condición de egresado y la obtención del título profesional. Se suma el tiempo, en años, de todos los titulados, desde que egresan hasta que se titulan. · TEPTP: Total de titulados del programa de estudios, que han alcanzado el título profesional en los últimos cuatro años

      FORMA DE CÁLCULO: (Σ TETP / TEPTP) — sin factor ×100 (es un promedio)

      PERIODICIDAD (frecuencia de cálculo): Anual

      NOTAS: El registro de la información incluye a todos los titulados del programa de estudios de los últimos cuatro (04) años. La diferencia entre la fecha de egreso y titulación se expresa en "años y meses". El programa dispone de información periódica sobre los indicadores que componen la fórmula.

      📖 Fuente: Ficha ID25, p. 89 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id26
    ref_id: ID26
    name: Tiempo promedio entre egreso y primer empleo en el campo profesional
    category: process
    description: |-
      Tipo de dato: Promedio. Estándar(es): Estándar 6 RESPONSABILIDAD SOCIAL UNIVERSITARIA · Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 6.1, Criterio 6.2, Criterio 6.3, Criterio 8.2.

      OBJETIVO DE MEDICIÓN: Medir el promedio del tiempo transcurrido entre la obtención de la condición de egresado y el primer empleo en el campo profesional

      VALOR REFERENCIAL / UMBRAL: ID26 ≤ 1 año (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID26 menor a un año evidencia que el tiempo transcurrido entre la obtención de la condición de egresado y el primer empleo en el campo profesional, es adecuado.

      FUENTE DE INFORMACIÓN: Registro de egresados del programa de estudios de los últimos diez años que contenga información de la fecha de egreso y fecha de ingreso al primer empleo (incluye el autoempleo) en el campo profesional.

      VARIABLES: TOCEPE: Tiempo transcurrido entre la obtención de la condición de egresado y el primer empleo en el campo profesional. Se suman los tiempos, en años, transcurridos por egresado. Si no trabaja en su campo, no se considera en la suma. · TEEP: Total de egresados encuestados del programa de estudios

      FORMA DE CÁLCULO: (Σ TOCEPE / TEEP) — sin factor ×100 (es un promedio)

      PERIODICIDAD (frecuencia de cálculo): Anual

      NOTAS: El registro de la información considera a todos los egresados del programa de los últimos diez (10) años. El registro del primer empleo en el campo profesional corresponde a partir de la fecha de egreso (o graduación oficial) hasta la fecha de inicio de su primer empleo o autoempleo. La diferencia entre la fecha de egreso y primer empleo se expresa en "años y meses".

      📖 Fuente: Ficha ID26, p. 90 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id27
    ref_id: ID27
    name: Porcentaje de egresados que laboran en su campo profesional
    category: process
    description: |-
      Tipo de dato: Porcentaje. Estándar(es): Estándar 6 RESPONSABILIDAD SOCIAL UNIVERSITARIA · Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 6.1, Criterio 6.2, Criterio 6.3, Criterio 8.2.

      OBJETIVO DE MEDICIÓN: Medir el porcentaje de egresados del programa de estudios que laboran en su campo profesional

      VALOR REFERENCIAL / UMBRAL: ID27 ≥ 50% (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID27 igual o mayor a 50% evidencia que el porcentaje de egresados del programa que laboran en su campo profesional es adecuado

      FUENTE DE INFORMACIÓN: Registro de egresados del programa de estudios de los últimos diez años que contenga información de la fecha de egreso y fecha de ingreso al primer empleo (incluye el autoempleo) en el campo profesional.

      VARIABLES: EPLCP: Egresados del programa de estudios encuestados que laboran en su campo profesional · TEEP: Total de egresados encuestados del programa de estudios

      FORMA DE CÁLCULO: (EPLCP / TEEP) × 100

      PERIODICIDAD (frecuencia de cálculo): Anual

      NOTAS: El registro de la información considera a los egresados del programa de estudios, por lo menos de los últimos cinco (5), seis (6) o siete (7) años del programa de estudios, según corresponda.

      📖 Fuente: Ficha ID27, p. 91 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id28
    ref_id: ID28
    name: Porcentaje de estudiantes que han alcanzado el título profesional, dentro de los dos años posteriores a su egreso
    category: process
    description: |-
      Tipo de dato: Porcentaje. Estándar(es): Estándar 6 RESPONSABILIDAD SOCIAL UNIVERSITARIA · Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 6.1, Criterio 6.2, Criterio 6.3, Criterio 8.2, Criterio 8.5.

      OBJETIVO DE MEDICIÓN: Medir el porcentaje de estudiantes del programa de estudios que han alcanzado el título profesional, dentro de los dos años posteriores a su egreso

      VALOR REFERENCIAL / UMBRAL: ID28 ≥ 60% (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID28 igual o mayor a 60% evidencia que la tasa de titulación dentro de los dos años de egreso es adecuada

      FUENTE DE INFORMACIÓN: Registro de egresados del programa de estudios (fecha de inicio de estudios, fecha de declaración de la condición de egresado, fecha de emisión del grado de bachiller, fecha de emisión del título profesional o licenciatura).

      VARIABLES: EGPTL: Egresados del programa de estudios que alcanzaron el título profesional o licenciatura hasta dos años después de su egreso · TEP: Total de egresados del programa de estudios — [la fórmula usa la sigla "EPTL", distinta de la declarada "EGPTL"; discrepancia del original]

      FORMA DE CÁLCULO: (EPTL / TEP) × 100

      PERIODICIDAD (frecuencia de cálculo): Anual

      NOTAS: El registro de la información considera a todos los egresados del programa de estudios, por lo menos de los últimos cinco (05) años. Se requiere evidencia de las fechas de egreso y titulación para los egresados declarados con título profesional o licenciatura.

      📖 Fuente: Ficha ID28, p. 92 del Modelo CONEAU 2025.
  - urn: urn:intuitem:risk:function:coneau-programas-2025:id29
    ref_id: ID29
    name: Porcentaje de empleadores satisfechos con el desempeño de los egresados
    category: process
    description: |-
      Tipo de dato: Porcentaje. Estándar(es): Estándar 6 RESPONSABILIDAD SOCIAL UNIVERSITARIA · Estándar 8 GESTIÓN DE LA INFORMACIÓN. Criterio(s): Criterio 6.1, Criterio 6.2, Criterio 6.3, Criterio 8.5.

      OBJETIVO DE MEDICIÓN: Medir el porcentaje de empleadores (de egresados del programa de estudios) satisfechos con el desempeño de los egresados del programa

      VALOR REFERENCIAL / UMBRAL: ID29 ≥ 70% (margen de error de ±3% según la escala de valoración oficial, Sección IX 9.1).

      INTERPRETACIÓN: Un ID29 igual o mayor a 70% evidencia que el desempeño de los egresados del programa resulta satisfactorio para los empleadores

      FUENTE DE INFORMACIÓN: Registro de resultados de consulta dirigida a empleadores

      VARIABLES: EMSDE: Empleadores satisfechos con el desempeño de los egresados del programa de estudios · TEMR: Total de empleadores que respondieron la consulta

      FORMA DE CÁLCULO: (EMSDE / TEMR) × 100

      PERIODICIDAD (frecuencia de cálculo): Anual

      NOTAS: La consulta considera a los empleadores de los egresados del programa de estudios

      📖 Fuente: Ficha ID29, p. 93 del Modelo CONEAU 2025.
